name: 🧩 Merge Backstitch Builds
on:
  workflow_call:

jobs:
  merge-builds:
    runs-on: "ubuntu-latest"
    name: 🧩 Merge Backstitch Builds
    strategy:
      fail-fast: false
    steps:
      # just download the artifacts from the macos, windows and linux plugin builds
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: backstitch-build-*
          path: ${{ github.workspace }}/backstitch
          merge-multiple: true
      - name: Wut
        run: |
          ls -la ${{ github.workspace }}/backstitch/bin || echo "No artifacts"

      - name: Upload backstitch
        uses: actions/upload-artifact@v4
        with:
          path: backstitch
          name: backstitch
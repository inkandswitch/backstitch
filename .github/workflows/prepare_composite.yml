name: 🚀 Prepare Windows-Ready Projects
on:
  workflow_call:

jobs:
  # Endless has requested a special version of moddable-platformer with:
  # 1. Backstitch installed
  # 2. Godot for Windows installed in godot_editor/
  # 3. Launch and update scripts from LilithSilver/backstitch-update-script
  # moddable-platformer-with-backstitch already provides 1, so we just need to handle 2 and 3
  prepare-moddable-platformer-composite:
    runs-on: ubuntu-latest
    name: 🚀 Prepare Windows-Ready Projects
    steps:
      - name: Acquire moddable-platformer-with-backstitch
        uses: actions/download-artifact@v4
        with:
          name: moddable-platformer-with-backstitch
          path: ${{ github.workspace }}/moddable-platformer
      - name: Acquire godot-windows
        uses: actions/download-artifact@v4
        with:
          name: godot-with-backstitch-windows
          path: ${{ github.workspace }}/godot-with-backstitch-windows
      - name: Copy Godot into moddable-platformer
        run: |
          mkdir moddable-platformer/godot_editor
          cp godot-with-backstitch-windows/* moddable-platformer/godot_editor
      - uses: robinraju/release-downloader@v1
        with:
          repository: 'LilithSilver/backstitch-update-script'
          latest: true
          fileName: '*'
          out-file-path: 'backstitch-update-script'

      - name: Write info
        run: |
          find . -maxdepth 3
      - name: Checkout backstitch # for actions
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: backstitch-tmp
          repository: inkandswitch/backstitch-godot-plugin
      - name: Windows Sign
        uses: ./backstitch-tmp/.github/actions/windows-sign
        with:
          BINARY_PATHS: |
            ./backstitch-update-script/update-backstitch.exe
            ./backstitch-update-script/launch-backstitch.exe
          KMS_CREDENTIALS_JSON: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}
          KMS_PUBLIC_CERT: ${{ secrets.CODESIGN_PUBLIC_CERT }}
          KMS_PROJECT: ${{ secrets.KMS_PROJECT }}
          KMS_LOCATION: ${{ secrets.KMS_LOCATION }}
          KMS_KEYRING: ${{ secrets.KMS_KEYRING }}
          KMS_KEY: ${{ secrets.KMS_KEY }}
      - name: Copy exe files
        run: cp backstitch-update-script/*.exe moddable-platformer
      - name: Merge .gitignore
        run: cat backstitch-update-script/default.gitignore >> moddable-platformer/.gitignore
      - name: Write .backstitch_version
        run: echo "${{ github.ref_name }}" >> moddable-platformer/.backstitch_version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          include-hidden-files: true
          name: moddable-platformer-windows-ready
          path: moddable-platformer
          if-no-files-found: error

name: 📦 Release
on:
  workflow_call:

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    name: ✉️ Release ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - godot-with-backstitch-windows
          - godot-with-backstitch-linux
          - godot-with-backstitch-macos
          - backstitch
          - threadbare-with-backstitch
          - moddable-platformer-with-backstitch
          - moddable-pong-with-backstitch

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.artifact }}
          path: ${{ github.workspace }}

      # set permissions
      - name: Set permissions for Linux
        if: matrix.artifact == 'godot-with-backstitch-linux'
        shell: bash
        run: |
          chmod +x ${{ matrix.artifact }}/*
      - name: Set permissions for macOS
        if: matrix.artifact == 'godot-with-backstitch-macos'
        shell: bash
        run: |
          chmod +x ${{ matrix.artifact }}/godot_macos_editor.app/Contents/MacOS/Godot
      - name: Set chmod for launcher
        if: endsWith(matrix.artifact, '-with-backstitch')
        shell: bash
        run: |
          chmod a+x ${{ matrix.artifact }}/backstitch-launcher-linux
          chmod a+x ${{ matrix.artifact }}/backstitch-launcher-macos.app/Contents/MacOS/backstitch-launcher
      - name: Remove Git LFS object cache
        shell: bash
        run: |
          cd ${{ matrix.artifact }}
          rm -rf .git/lfs/objects

      - name: Zip artifact
        run: |
          cd ${{ matrix.artifact }}
          zip -r9  ../${{ matrix.artifact }}.zip .

      - name: Release artifact
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.zip

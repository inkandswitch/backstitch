name: 📦 Release
on:
  workflow_call:

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    name: ✉️ Release ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - backstitch
          - threadbare-with-backstitch
          - moddable-platformer-with-backstitch
          - moddable-pong-with-backstitch

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.artifact }}
          path: ${{ github.workspace }}

      # set permissions
      - name: Set chmod for launcher
        if: endsWith(matrix.artifact, '-with-backstitch')
        shell: bash
        run: |
          chmod a+x ${{ matrix.artifact }}/backstitch-launcher-linux
          chmod a+x ${{ matrix.artifact }}/backstitch-launcher-macos.app/Contents/MacOS/backstitch-launcher
      - name: Remove Git LFS object cache
        shell: bash
        run: |
          cd ${{ matrix.artifact }}
          rm -rf .git/lfs/objects

      - name: Zip artifact
        run: |
          cd ${{ matrix.artifact }}
          zip -r9  ../${{ matrix.artifact }}.zip .

      - name: Release artifact
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.zip

  release_metadata:
    runs-on: ubuntu-latest
    name: 🏷️ Append Release Metadata
    steps:
      - uses: actions/checkout@v4
      - id: dotenv
        uses: falti/dotenv-action@v1.1.5
        with:
          path: build.env
          keys-case: bypass
      - name: Append metadata to release
        uses: irongut/EditRelease@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          id: ${{ github.event.release.id }}
          replacebody: false
          body: |
            <!-- BEGIN_RELEASE_METADATA
            {
              "MINIMUM_GODOT": "${{steps.dotenv.outputs.MINIMUM_GODOT}}"
              "RECOMMENDED_GODOT": "${{steps.dotenv.outputs.RECOMMENDED_GODOT}}"
              "MINIMUM_LAUNCHER": "${{steps.dotenv.outputs.MINIMUM_LAUNCHER}}"
              "RECOMMENDED_LAUNCHER": "${{steps.dotenv.outputs.RECOMMENDED_LAUNCHER}}"
            }
            END_RELEASE_METADATA -->
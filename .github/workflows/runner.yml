# This workflow runs all the rest of the workflows
name: 🔗 Builds
on:
    push:
      paths:
        - "**"
        - "!**.md"
        - "!LICENSE"
        - "!.scripts/clang_format.sh"
        - "!.github/**"
        - "!.vscode/**"
        - ".github/actions/**"
        - ".github/workflows/**"
    pull_request:
      paths:
        - "**"
        - "!**.md"
        - "!LICENSE"
        - "!.scripts/clang_format.sh"
        - "!.github/**"
        - "!.vscode/**"
        - ".github/actions/**"
        - ".github/workflows/**"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-validation:
    name: 🔍 Rust Validation
    uses: ./.github/workflows/rust_validation.yml

  macos-plugin-builds:
    name: 🍎 Build Backstitch for macOS
    uses: ./.github/workflows/macos_builds.yml
    secrets: inherit

  windows-plugin-builds:
    name: 🪟 Build Backstitch for Windows
    uses: ./.github/workflows/windows_builds.yml
    secrets: inherit
    permissions:
      contents: 'read'
      id-token: 'write'
  
  linux-plugin-builds:
    name: 🐧 Build Backstitch for Linux
    uses: ./.github/workflows/linux_builds.yml

  merge-plugin-builds:
    name: 🧩 Merge Backstitch Builds
    needs: [macos-plugin-builds, windows-plugin-builds, linux-plugin-builds]
    uses: ./.github/workflows/merge_builds.yml

  compose-projects:
    name: 🧵 Compose Projects
    needs: [merge-plugin-builds]
    uses: ./.github/workflows/compose_projects.yml

  release:
    name: 📦 Release
    if: github.ref_type == 'tag'
    needs: [merge-plugin-builds, compose-projects]
    uses: ./.github/workflows/release.yml